name: Full Stack CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      server: ${{ steps.filter.outputs.server }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Path filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            client:
              - 'client/**'
            server:
              - 'server/**'
            docker:
              - 'docker-compose*.yml'
              - '**/Dockerfile'

  client-ci:
    name: Client CI
    needs: changes
    if: needs.changes.outputs.client == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/frontend.yml

  server-ci:
    name: Server CI
    needs: changes
    if: needs.changes.outputs.server == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/backend.yml

  docker-compose:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docker == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose
        run: docker compose -f docker-compose.yml config --quiet

      - name: Build all services
        run: docker compose -f docker-compose.yml build

  deploy-check:
    name: Deploy Readiness
    runs-on: ubuntu-latest
    needs: [client-ci, server-ci]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Check job results
        run: |
          echo "Client CI: ${{ needs.client-ci.result }}"
          echo "Server CI: ${{ needs.server-ci.result }}"
          if [[ "${{ needs.client-ci.result }}" == "failure" || "${{ needs.server-ci.result }}" == "failure" ]]; then
            echo "❌ One or more CI jobs failed"
            exit 1
          fi
          echo "✅ All CI checks passed — ready to deploy"
