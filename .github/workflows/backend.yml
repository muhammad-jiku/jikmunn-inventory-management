name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
  workflow_call:

env:
  NODE_VERSION: '20'
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inventory_test
  JWT_SECRET: ci-test-jwt-secret-key-16chars
  JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret-key
  NODE_ENV: test

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: server/yarn.lock

      - name: Install dependencies
        working-directory: server
        run: yarn install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Lint
        working-directory: server
        run: yarn lint

      - name: Type Check
        working-directory: server
        run: yarn type-check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inventory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: server/yarn.lock

      - name: Install dependencies
        working-directory: server
        run: yarn install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Run database migrations
        working-directory: server
        run: npx prisma migrate deploy

      - name: Run tests with coverage
        working-directory: server
        run: yarn test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-coverage-report
          path: server/coverage/
          retention-days: 30

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: server/yarn.lock

      - name: Install dependencies
        working-directory: server
        run: yarn install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Build
        working-directory: server
        run: yarn build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: server/dist/
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [unit-tests, build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          tags: jikmunn-inventory-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
