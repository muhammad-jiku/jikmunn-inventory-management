# ──────────────────────────────────────────────────
# Jikmunn Inventory Management — Docker Compose
# ──────────────────────────────────────────────────
# Usage:
#   docker compose up -d            # start all services
#   docker compose up -d --build    # rebuild & start
#   docker compose logs -f server   # tail server logs
#   docker compose down -v          # stop & remove volumes
# ──────────────────────────────────────────────────

services:
  # ── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: jikmunn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-inventory_management}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Express API Server ──────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: jikmunn-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${SERVER_PORT:-3001}:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-inventory_management}?schema=public
      CORS_ORIGINS: http://localhost:3000,http://client:3000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_DSN: ${SENTRY_SERVER_DSN:-}
    volumes:
      - server-logs:/app/logs
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3001/health',
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Next.js Client ─────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:${SERVER_PORT:-3001}
    container_name: jikmunn-client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - '${CLIENT_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${SERVER_PORT:-3001}
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3000',
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  pgdata:
    driver: local
  server-logs:
    driver: local
